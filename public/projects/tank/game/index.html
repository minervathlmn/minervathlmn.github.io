<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tanks — Minerva Limina</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
 
  <link rel="stylesheet" href="../style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body>

  <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" aria-label="Toggle menu">&#9776;</button>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <section id="game-screen">
    <aside id="sidebar">
      <h2 class="sidebar-title">Tank Wars</h2>

      <p id="turn-indicator" class="turn-indicator">Your turn</p>

      <div id="sidebar-scoreboard-wrap">
        <div class="scoreboard">
          <div class="scoreboard-heading">Scoreboard</div>
          <div class="scoreboard-divider"></div>
          <div id="scoreboard-rows" class="scoreboard-rows">
            <!-- one .scoreboard-player-row per tank, injected by UI-game.js -->
          </div>
        </div>
        <div class="sidebar-divider"></div>
      </div>

      <button id="shop-btn" class="btn-sidebar">Shop</button>
      <button id="info-btn" class="btn-sidebar">Info</button>

      <div class="sidebar-spacer"></div>

      <button id="sidebar-leave-btn" class="btn-sidebar">Leave</button>

      <div class="sidebar-divider"></div>

      <button id="settings-btn" class="btn-sidebar">Settings</button>
    </aside>

    <div id="canvas-container"></div>
  </section>

  <!-- Settings modal: appearance only, per current scope -->
  <div id="settings-modal" class="sidebar-modal hidden">
    <div class="sidebar-modal-content">
      <button id="close-settings-btn" class="sidebar-modal-close" aria-label="Close">&times;</button>
      <h2 class="subtitle">Options</h2>

      <div class="settings-section">
        <p class="settings-heading">Appearance</p>
        <div class="appearance-toggle">
          <span class="toggle-label">Light</span>
          <button id="dark-mode-toggle" class="toggle-switch" role="switch" aria-checked="false" aria-label="Toggle dark mode">
            <span class="toggle-knob"></span>
          </button>
          <span class="toggle-label">Dark</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/colyseus.js@^0.16.0/dist/colyseus.js"></script>
  <script src="../js/Network.js"></script>

  <!-- shared helpers / palette -->
  <script src="../js/utils.js"></script>
  <script src="../js/theme.js"></script>
  <script src="../js/CosmeticProjectile.js"></script>

  <!-- model classes (dependency order matters: no bundler here) -->
  <script src="../js/Board.js"></script>
  <script src="../js/Explosion.js"></script>
  <script src="../js/PlayerHUD.js"></script>

  <!-- p5 entry point: canvas, render loop, input -->
  <script src="../js/UI-game.js"></script>
  <script src="../js/sketch.js"></script>

  <!-- Sidebar chrome: toggle, settings modal, leave. Turn indicator and
       scoreboard content itself are updated from within sketch.js's draw()
       loop, since they depend on live room state. -->
  <script>
    const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
    const sidebar = document.getElementById('sidebar');
    const sidebarBackdrop = document.getElementById('sidebar-backdrop');

    function openSidebar() {
      sidebar.classList.add('open');
      sidebarBackdrop.classList.add('open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      sidebarBackdrop.classList.remove('open');
    }
    sidebarToggleBtn.addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    sidebarBackdrop.addEventListener('click', closeSidebar);

    // Settings modal (appearance only)
    const settingsModal = document.getElementById('settings-modal');
    document.getElementById('settings-btn').addEventListener('click', () => {
      settingsModal.classList.remove('hidden');
    });
    document.getElementById('close-settings-btn').addEventListener('click', () => {
      settingsModal.classList.add('hidden');
    });

    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const gameScreen = document.getElementById('game-screen');
    darkModeToggle.addEventListener('click', () => {
      const isDark = gameScreen.classList.toggle('dark-mode');
      darkModeToggle.setAttribute('aria-checked', String(isDark));
    });

    // Shop / Info: stubs only, not wired up yet
    document.getElementById('shop-btn').addEventListener('click', () => {});
    document.getElementById('info-btn').addEventListener('click', () => {});

    // Leave: same mechanism as checkers' "Home" — bail out of the room
    // via TankNetwork.leaveRoom(), then return to the lobby menu screen.
    document.getElementById('sidebar-leave-btn').addEventListener('click', async () => {
      try {
        await TankNetwork.leaveRoom();
      } catch (e) {
        console.warn('Error leaving room:', e);
      }
      window.location.href = '../play/index.html?screen=menu';
    });
  </script>
</body>
</html>
