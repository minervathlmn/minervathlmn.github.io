<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkers — Menu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <!-- ==== Mode / Difficulty Select Screen ==== -->
  <section id="mode-select-screen" class="screen">
    <h2 class="subtitle">Choose a mode</h2>
    <div class="mode-actions">
      <button id="one-player-btn" class="btn btn-primary">1 Player</button>
      <button id="two-player-btn" class="btn btn-primary">2 Players</button>
    </div>

    <div id="difficulty-select" class="difficulty-panel hidden">
      <p class="eyebrow">Difficulty</p>
      <div class="difficulty-actions">
        <button class="btn btn-outline" data-difficulty="beginner">Beginner</button>
        <button class="btn btn-outline" data-difficulty="intermediate">Intermediate</button>
        <button class="btn btn-outline" data-difficulty="advanced">Advanced</button>
      </div>
    </div>

    <button id="mode-back-btn" class="btn btn-text">Back</button>
  </section>

  <!-- ==== Scripts ==== -->
  <script src="../js/UI-modeselect.js"></script>
</body>
</html>
